<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Family Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-people-fill me-2"></i>Family Dashboard
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
            <i class="bi bi-house me-1"></i>Ages
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'birthdays' %}active{% endif %}" href="/birthdays">
            <i class="bi bi-cake2 me-1"></i>Birthdays
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'timeline' %}active{% endif %}" href="/timeline">
            <i class="bi bi-clock-history me-1"></i>Timeline
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'milestones' %}active{% endif %}" href="/milestones">
            <i class="bi bi-stars me-1"></i>Milestones
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'facts' %}active{% endif %}" href="/facts">
            <i class="bi bi-heart me-1"></i>Family Facts
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted small py-3 border-top mt-4">
  Family Age Dashboard &mdash; {{ today.year if today is defined else '' }}
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
